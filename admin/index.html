<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Myumminess · CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#1A1A1A;--ink-2:#2a2a2a;--muted:#7A7A7A;--muted-2:#A9A294;
    --line:#E6E4DE;--line-2:#EFECE4;--paper:#FFFFFF;
    --surface:#FAF8F4;--surface-2:#F3EFE7;--input:#F5F3EE;
    --matcha:#6DBE7B;--matcha-deep:#4E9A5E;--matcha-soft:#E6F2E3;
    --peach:#FF9B7A;--peach-deep:#E87A56;
    --danger:#E05252;--warn:#D49A2E;--info:#3A7BFF;
    --accent:var(--matcha);--accent-deep:var(--matcha-deep);
    --serif:'Playfair Display',Georgia,serif;
    --sans:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--surface);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px}
  body{min-width:1440px;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;padding:0}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
  img{display:block;max-width:100%}
  ::selection{background:var(--accent);color:#fff}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}

  .ph{position:relative;overflow:hidden;background:var(--surface-2);
    background-image:repeating-linear-gradient(135deg,rgba(26,26,26,0.04) 0 2px,transparent 2px 14px),linear-gradient(180deg,#EFECE4,#E6E1D5);color:#6b6658}
  .ph.matcha{background-image:repeating-linear-gradient(135deg,rgba(26,26,26,0.05) 0 2px,transparent 2px 14px),linear-gradient(180deg,#cfe3c8,#a9cfa9);color:#2f4a30}
  .ph.peach{background-image:repeating-linear-gradient(135deg,rgba(26,26,26,0.05) 0 2px,transparent 2px 14px),linear-gradient(180deg,#ffd6c2,#ffb79a);color:#7a3b25}
  .ph.dark{background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.04) 0 2px,transparent 2px 14px),linear-gradient(180deg,#2a2a2a,#1a1a1a);color:#b7b3a8}
  .ph .lbl{position:absolute;left:6px;bottom:4px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.8}

  /* Login */
  .login{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--paper)}
  .login-side{position:relative;background:var(--ink);color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .login-side::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 400px at 80% 20%,rgba(109,190,123,.3),transparent 60%),radial-gradient(500px 360px at 20% 90%,rgba(255,155,122,.2),transparent 60%);pointer-events:none}
  .login-side .top{position:relative;z-index:1;display:flex;align-items:center;gap:12px}
  .login-side .top .logo{height:22px}
  .login-side .top .tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;background:rgba(255,255,255,.1);padding:4px 10px;border-radius:999px;color:#efeadf}
  .login-side .mid{position:relative;z-index:1}
  .login-side .mid h1{font-family:var(--serif);font-weight:500;font-size:56px;line-height:1.02;letter-spacing:-.02em;margin:0 0 18px}
  .login-side .mid h1 em{font-style:italic;color:var(--matcha)}
  .login-side .mid p{font-size:16px;line-height:1.55;color:#d9d4c7;max-width:440px}
  .login-side .bot{position:relative;z-index:1;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#a9a294}
  .login-form{display:flex;flex-direction:column;justify-content:center;padding:56px 80px}
  .login-form .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .login-form h2{font-family:var(--serif);font-weight:500;font-size:40px;letter-spacing:-.015em;margin:10px 0 28px}
  .fld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .fld label{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .fld input, .fld select, .fld textarea{background:var(--input);border:1px solid transparent;border-radius:10px;padding:12px 14px;outline:0;transition:border-color .2s ease,background .2s ease}
  .fld input:focus, .fld select:focus, .fld textarea:focus{border-color:var(--accent);background:#fff}
  .fld textarea{min-height:90px;resize:vertical;line-height:1.5;font-family:inherit}
  .fld .hint{font-size:11.5px;color:var(--muted);margin-top:2px}
  .login-form .btn{margin-top:8px}
  .login-form .foot{margin-top:28px;font-size:12.5px;color:var(--muted);display:flex;justify-content:space-between}
  .login-form .hint-box{margin-top:20px;background:var(--matcha-soft);border-left:3px solid var(--matcha);padding:12px 14px;border-radius:8px;font-size:12.5px;color:#2f4a30;line-height:1.5}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;font-weight:500;font-size:13.5px;letter-spacing:.01em;transition:transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-primary:hover{background:#000}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:var(--accent-deep)}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-danger{background:#fff;color:var(--danger);border:1px solid var(--line)}
  .btn-danger:hover{border-color:var(--danger);background:#FDF3F3}
  .btn-sm{height:34px;padding:0 12px;font-size:12.5px;border-radius:8px}
  .btn-lg{height:48px;padding:0 22px;font-size:14.5px;border-radius:12px}

  /* App shell */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sb-head{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-2)}
  .sb-head img{height:20px}
  .sb-head .sub{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-left:auto;background:var(--surface);padding:4px 8px;border-radius:6px}
  .sb-section{padding:16px 12px 4px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-2)}
  .sb-nav{padding:0 10px}
  .sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13.5px;color:#3d3d3d;cursor:pointer;transition:background .15s ease,color .15s ease;margin-bottom:2px;position:relative}
  .sb-item:hover{background:var(--surface)}
  .sb-item.on{background:var(--ink);color:#fff}
  .sb-item.on .n{background:rgba(255,255,255,.18)}
  .sb-item .n{margin-left:auto;font-family:var(--mono);font-size:10.5px;background:var(--surface-2);padding:2px 7px;border-radius:999px;color:var(--muted)}
  .sb-foot{margin-top:auto;padding:14px;border-top:1px solid var(--line-2)}
  .sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
  .sb-user .av{width:34px;height:34px;border-radius:999px;background:var(--matcha-soft);color:var(--matcha-deep);display:grid;place-items:center;font-weight:600;font-size:13px}
  .sb-user .t{font-size:13px;font-weight:500;line-height:1.2}
  .sb-user .t span{display:block;color:var(--muted);font-size:11.5px;font-weight:400;margin-top:1px}

  /* Main */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 28px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .breadcrumb b{color:var(--ink);font-weight:500}
  .topbar .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--input);border-radius:10px;height:36px;padding:0 12px;width:300px}
  .topbar .search input{border:0;outline:0;background:transparent;flex:1;font-size:13px}
  .topbar kbd{font-family:var(--mono);font-size:10px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:2px 6px;border-radius:6px}
  .icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:transparent;transition:background .15s ease}
  .icon-btn:hover{background:var(--surface)}
  .icon-btn.pill{background:var(--surface);}
  .pageview{padding:24px 28px;max-width:1200px;width:100%}

  /* Page heads */
  .ph-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:20px}
  .ph-head h1{font-family:var(--serif);font-weight:500;font-size:34px;letter-spacing:-.015em;margin:0;line-height:1.1}
  .ph-head .ek{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .ph-head p{color:var(--muted);font-size:13.5px;margin:6px 0 0;max-width:520px}
  .ph-head .actions{display:flex;gap:8px;flex-shrink:0}

  /* Cards */
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px}
  .card + .card{margin-top:16px}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
  .card-head h3{font-family:var(--serif);font-weight:500;font-size:18px;margin:0;letter-spacing:-.005em}
  .card-head .hint{font-size:12px;color:var(--muted)}

  /* Stat tiles */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
  .stat .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:var(--serif);font-size:34px;letter-spacing:-.01em;line-height:1;font-weight:500}
  .stat .d{font-size:11.5px;color:var(--matcha-deep);font-weight:500;display:inline-flex;align-items:center;gap:4px}
  .stat .d.down{color:var(--danger)}
  .stat .spark{position:absolute;right:14px;top:14px;width:52px;height:26px;opacity:.7}

  /* Grid helpers */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .split-main{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:flex-start}

  /* Tables */
  .tbl{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);font-size:13.5px}
  .tbl th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--surface)}
  .tbl td{padding:14px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tr:hover td{background:var(--surface)}
  .tbl .title{font-weight:500;color:var(--ink)}
  .tbl .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .tbl .row-thumb{display:flex;align-items:center;gap:12px}
  .tbl .row-thumb .ph{width:48px;height:48px;border-radius:10px;flex-shrink:0}
  .tbl td.num{font-family:var(--mono);font-variant-numeric:tabular-nums;color:#3d3d3d;font-size:12.5px}
  .tbl td.act{text-align:right;white-space:nowrap}

  /* Chips / pills */
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:500;font-family:var(--sans)}
  .chip.live{background:var(--matcha-soft);color:var(--matcha-deep)}
  .chip.draft{background:#F3F0E7;color:#8a7d5a}
  .chip.sched{background:#EFF3FF;color:#3a63b3}
  .chip.arch{background:#F3F0EC;color:var(--muted)}
  .chip.low{background:#FDF3F3;color:var(--danger)}

  /* Filter row */
  .fbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .fbar .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;height:38px;padding:0 12px;width:280px}
  .fbar .search input{border:0;outline:0;background:transparent;flex:1;font-size:13px}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:10px;padding:3px;gap:2px}
  .seg button{padding:6px 12px;font-size:12.5px;border-radius:7px;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06);font-weight:500}
  .fbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}

  /* Editor panel */
  .editor{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:flex-start}
  .tab-row{display:flex;gap:2px;background:var(--surface-2);border-radius:10px;padding:3px;margin-bottom:16px;width:max-content}
  .tab-row button{padding:7px 14px;font-size:13px;border-radius:7px;color:var(--muted)}
  .tab-row button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06);font-weight:500}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field-grid .full{grid-column:1/-1}
  .help{font-size:12px;color:var(--muted);line-height:1.5}

  /* Drop zone */
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:18px;background:var(--surface);display:flex;gap:14px;align-items:center;transition:border-color .15s ease, background .15s ease}
  .drop:hover{border-color:var(--accent);background:var(--matcha-soft)}
  .drop .ic{width:40px;height:40px;border-radius:10px;background:#fff;display:grid;place-items:center;color:var(--muted)}
  .drop .t b{display:block;font-size:13.5px}
  .drop .t span{font-size:12px;color:var(--muted)}

  /* Media grid */
  .media{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .media .tile{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;position:relative}
  .media .tile:hover{transform:translateY(-2px);box-shadow:0 8px 20px -12px rgba(0,0,0,.15)}
  .media .tile .thumb{aspect-ratio:1;}
  .media .tile .meta{padding:8px 10px}
  .media .tile .n{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .media .tile .s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}

  /* Settings */
  .sw{position:relative;width:34px;height:20px;background:#ddd;border-radius:999px;cursor:pointer;transition:background .15s ease}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:999px;transition:left .15s ease;box-shadow:0 1px 2px rgba(0,0,0,.15)}
  .sw.on{background:var(--accent)}
  .sw.on::after{left:16px}

  /* Preview phone/iframe */
  .preview-box{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:12px;position:sticky;top:76px}
  .preview-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .preview-top .u{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:#fff;padding:4px 8px;border-radius:6px}
  .preview-frame{aspect-ratio:4/5;background:#fff;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}

  .toast{position:fixed;right:22px;bottom:22px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;display:flex;gap:10px;align-items:center;box-shadow:0 18px 40px -16px rgba(0,0,0,.4);z-index:1000;animation:toast .25s ease both}
  .toast .d{width:8px;height:8px;border-radius:999px;background:var(--matcha)}
  @keyframes toast{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty h3{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--ink);margin:8px 0 6px}
  .empty p{font-size:13.5px;margin:0 auto 16px;max-width:360px;line-height:1.5}

  .kv{display:grid;grid-template-columns:120px 1fr;gap:12px;font-size:13px;padding:10px 0;border-bottom:1px solid var(--line-2)}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
  .badge-dot{display:inline-flex;align-items:center;gap:6px}
  .badge-dot .d{width:6px;height:6px;border-radius:999px;background:var(--matcha)}

  .activity{display:flex;flex-direction:column;gap:14px}
  .act-item{display:flex;gap:10px;align-items:flex-start;font-size:13px}
  .act-item .av{width:28px;height:28px;border-radius:999px;background:var(--surface-2);display:grid;place-items:center;color:var(--muted);flex-shrink:0;font-size:11px;font-weight:600}
  .act-item .av.m{background:var(--matcha-soft);color:var(--matcha-deep)}
  .act-item .t{line-height:1.45}
  .act-item .t b{font-weight:500}
  .act-item .t span{display:block;color:var(--muted);font-size:11.5px;margin-top:2px;font-family:var(--mono);letter-spacing:.04em}

  .modal-scrim{position:fixed;inset:0;background:rgba(26,26,26,.5);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;animation:toast .2s ease both}
  .modal{background:#fff;border-radius:16px;padding:24px;width:520px;max-width:92vw;box-shadow:0 40px 80px -20px rgba(0,0,0,.35)}
  .modal h2{font-family:var(--serif);font-weight:500;font-size:22px;margin:0 0 4px}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .modal .foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  hr{border:0;border-top:1px solid var(--line);margin:16px 0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============ Icon set ============ */
const Icon = ({name, size=16, stroke=1.8}) => {
  const p = {
    dash: <><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></>,
    pages: <><path d="M7 3h10l4 4v14H7z"/><path d="M17 3v4h4"/><path d="M11 11h6M11 15h6M11 19h4"/></>,
    recipe: <><path d="M4 7h16l-2 13H6z"/><path d="M9 7V4h6v3"/><path d="M9 12h6M9 16h4"/></>,
    shop: <><path d="M4 8h16l-1 12H5z"/><path d="M8 8V5a4 4 0 0 1 8 0v3"/></>,
    reel: <><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m10 9 6 3-6 3z" fill="currentColor" stroke="currentColor"/></>,

/* ============ GitHub API ============ */
const REPO = 'esigura/myumminess';
const GH_BRANCH = 'main';
const GH_API = 'https://api.github.com';

function ghToken()      { return localStorage.getItem('myumm.gh.token') || ''; }
function ghSetToken(t)  { localStorage.setItem('myumm.gh.token', t); }
function ghClearToken() { localStorage.removeItem('myumm.gh.token'); localStorage.removeItem('myumm.cms.auth'); }

async function ghFetch(path, opts = {}) {
  const url = path.startsWith('http') ? path
    : `${GH_API}/repos/${REPO}/contents/${path}${path.includes('?')?'&':'?'}ref=${GH_BRANCH}`;
  const r = await fetch(url, {
    ...opts,
    headers: {
      Authorization: `Bearer ${ghToken()}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {})
    }
  });
  if (r.status === 401) { ghClearToken(); window.location.reload(); return null; }
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${path}`);
  return r.json();
}

async function ghRead(path) {
  const res = await ghFetch(path);
  if (!res) return null;
  const binary = atob(res.content.replace(/\s/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const text = new TextDecoder().decode(bytes);
  return { data: path.endsWith('.json') ? JSON.parse(text) : text, sha: res.sha, path: res.path };
}

async function ghWrite(path, data, sha, message = 'Update via CMS') {
  const text = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  const bytes = new TextEncoder().encode(text);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  const content = btoa(binary);
  return ghFetch(path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content, sha, branch: GH_BRANCH })
  });
}

async function ghList(dir) {
  const items = await ghFetch(dir);
  return Array.isArray(items) ? items : [];
}

async function loadPagesFromGitHub() {
  const names = ['home','about','recipes','shop','blog','contact','follow','booking'];
  const results = {};
  await Promise.all(names.map(async n => {
    try { const r = await ghRead(`content/pages/${n}.json`); if (r) results[n] = r; }
    catch(e) { console.warn('Page load failed:', n, e); }
  }));
  return results;
}

async function loadCollectionFromGitHub(folder) {
  try {
    const files = await ghList(folder);
    const items = await Promise.all(
      files.filter(f => f.name.endsWith('.json') || f.name.endsWith('.md')).map(async f => {
        try {
          const r = await ghRead(f.path);
          if (!r) return null;
          if (f.name.endsWith('.md')) {
            const { front, body } = parseFrontmatter(r.data);
            return { ...front, body, _raw: r.data, _sha: r.sha, _path: f.path, _name: f.name };
          }
          return { ...r.data, _sha: r.sha, _path: f.path, _name: f.name };
        } catch(e) { return null; }
      })
    );
    return items.filter(Boolean);
  } catch(e) { return []; }
}

async function ghDelete(path, sha, message = 'Delete via CMS') {
  return ghFetch(path, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha, branch: GH_BRANCH })
  });
}

async function loadCommitsFromGitHub(n = 12) {
  try {
    const url = `${GH_API}/repos/${REPO}/commits?per_page=${n}&sha=${GH_BRANCH}`;
    const r = await fetch(url, {
      headers: { Authorization: `Bearer ${ghToken()}`, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
    });
    if (!r.ok) return [];
    return r.json();
  } catch(e) { return []; }
}

async function loadMediaFromGitHub(folder = 'Website') {
  try {
    const files = await ghList(folder);
    return Array.isArray(files) ? files.filter(f => f.type === 'file').map(f => ({
      name: f.name, path: f.path, sha: f.sha, size: f.size,
      url: f.download_url,
      kind: /\.(jpe?g|png|webp|gif|avif)$/i.test(f.name) ? 'image' : /\.(mp4|mov|webm)$/i.test(f.name) ? 'video' : 'file'
    })) : [];
  } catch(e) { return []; }
}

function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { front: {}, body: text };
  const front = {};
  m[1].split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx < 0) return;
    const k = line.slice(0, idx).trim();
    const v = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
    front[k] = v;
  });
  return { front, body: m[2].trim() };
}

function stringifyFrontmatter(front, body) {
  const lines = Object.entries(front).map(([k, v]) => {
    const s = String(v);
    return `${k}: ${s.includes(':') || s.includes('#') ? '"' + s + '"' : s}`;
  });
  return `---\n${lines.join('\n')}\n---\n\n${body}`;
}

              {recentCommits.slice(0,8).map((c,i) => {
                const msg = c.commit.message.split('\n')[0].slice(0,60);
                const author = c.commit.author.name || c.author?.login || '?';
                const initials = author.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
                const time = fmtDate(c.commit.author.date);
                return (
                  <div className="act-item" key={i}>
                    <div className="av">{initials}</div>
                    <div className="t"><b>{msg}</b><span>{author} · {time}</span></div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* ============ Image picker (shared) ============ */
function ImagePicker({value, onChange, ghMedia, setGhMedia, toast}){
  const [open, setOpen] = useState(false);
  const [uploading, setUploading] = useState(false);
  const fileRef = React.useRef();

  const handleUpload = async (files) => {
    if (!files||!files.length) return;
    setUploading(true);
    for (const file of Array.from(files)) {
      try {
        const ab = await file.arrayBuffer();
        const bytes = new Uint8Array(ab);
        let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
        const content = btoa(bin);
        const path = 'Website/'+file.name;
        const res = await ghFetch(path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Upload '+file.name+' via CMS',content,branch:GH_BRANCH})});
        const item = {name:file.name,path,sha:res.content?.sha,size:file.size,url:res.content?.download_url,kind:'image'};
        if(setGhMedia) setGhMedia(prev=>[item,...prev.filter(m=>m.path!==path)]);
        onChange('/'+path);
        setOpen(false);
      } catch(e){ if(toast) toast('Upload failed: '+e.message); }
    }
    setUploading(false);
  };

  const images = (ghMedia||[]).filter(m=>m.kind==='image');
  const preview = value||null;

  return (
    <div>
      <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
        {preview
          ? <div style={{width:100,height:68,borderRadius:8,overflow:'hidden',flexShrink:0,border:'1px solid var(--line)'}}><img src={preview} style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>
          : <div className="ph" style={{width:100,height:68,borderRadius:8,flexShrink:0}}><span className="lbl">none</span></div>
        }
        <div style={{display:'flex',flexDirection:'column',gap:6,justifyContent:'center'}}>
          <div style={{display:'flex',gap:6}}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={()=>setOpen(true)}>{preview?'Change image':'Choose image'}</button>
            {value&&<button type="button" className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>onChange('')}>Clear</button>}
          </div>
          {value&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',wordBreak:'break-all',maxWidth:300}}>{value}</span>}
        </div>
      </div>

      {open&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setOpen(false)}>
          <div style={{background:'#fff',borderRadius:16,width:740,maxHeight:'84vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 32px 96px -12px rgba(0,0,0,.35)'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',gap:12}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:600}}>Choose image</h3>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',letterSpacing:'.08em'}}>{images.length} files in Website/</span>
              <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleUpload(e.target.files)}/>
                <button type="button" className="btn btn-accent btn-sm" onClick={()=>fileRef.current.click()} disabled={uploading}><Icon name="upload" size={12}/> {uploading?'Uploading…':'Upload new'}</button>
                <button type="button" className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>Close</button>
              </div>
            </div>
            <div style={{padding:16,overflowY:'auto',flex:1}}>
              {images.length===0&&<div style={{padding:'48px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>No images in Website/ yet — upload one above.</div>}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
                {images.map((m,i)=>(
                  <div key={m.path||i} onClick={()=>{onChange('/'+m.path);setOpen(false);}} style={{cursor:'pointer',borderRadius:10,overflow:'hidden',border:('/'+m.path===value||m.path===value)?'2px solid var(--accent)':'1px solid var(--line)',background:'var(--surface-2)'}}>
                    <div style={{aspectRatio:'4/3',overflow:'hidden'}}>
                      <img src={m.url} alt={m.name} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                    </div>
                    <div style={{padding:'5px 8px',fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============ Page field editor (all 8 pages) ============ */
function PageFieldEditor({pageId, data, back, toast, ghPage, onSave, ghMedia, setGhMedia, ghRecList}){
  const p = data.pages.find(x=>x.id===pageId)||{title:pageId,path:'/',desc:'',updated:'—'};
  const initial = (ghPage&&ghPage.data) ? ghPage.data : {};
  const [local, setLocal] = useState(initial);
  const [saving, setSaving] = useState(false);

  const set = (key,val) => setLocal(prev=>({...prev,[key]:val}));

  const save = async () => {
    setSaving(true);
    if(onSave) await onSave(local); else toast('Saved');
    setSaving(false);
  };

  const fmtLabel = (key) => key
    .replace(/([A-Z])/g,' $1').replace(/(\d+)/g,' $1 ').replace(/\s+/g,' ').trim()
    .replace(/^./,s=>s.toUpperCase());

  const fieldType = (key, val) => {
    if(Array.isArray(val)) return 'array';
    const k = key.toLowerCase();
    if(k.endsWith('image')||k.startsWith('image')) return 'image';
    if(k.includes('body')||k.endsWith('sub')||k==='subtitle'||k.includes('blurb')||k==='promisebar'||(k.includes('desc')&&!k.includes('url'))) return 'textarea';
    if(k.includes('href')||k.endsWith('url')||k==='url') return 'url';
    return 'text';
  };

  const PFXGRP = {news:'Newsletter',stat:'Stats',path:'Paths & CTAs',why:'Why section',info:'Info cards',book:'Booking',phil:'Philosophy',story:'Story',chip:'Badges',cta:'Call to action',float:'Floating images',fb:'Facebook',tiktok:'TikTok'};
  const getGroup = (key) => { const k=key.toLowerCase(); for(const [p,l] of Object.entries(PFXGRP)) if(k.startsWith(p)) return l; return 'Content'; };

  const grouped = {};
  Object.entries(local).forEach(([k,v])=>{ if(typeof v==='object'&&!Array.isArray(v)&&v!==null) return; const g=getGroup(k); if(!grouped[g]) grouped[g]=[]; grouped[g].push([k,v]); });
  const groupOrder = ['Content',...Object.keys(grouped).filter(g=>g!=='Content').sort()];
  const noData = Object.keys(local).length===0;

  return (
    <>
      <div className="ph-head">
        <div>
          <div className="ek" style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={back} className="btn btn-ghost btn-sm" style={{height:22,padding:'0 8px',fontSize:11}}><Icon name="chevR" size={10}/> Pages</button>
            {p.title}
          </div>
          <h1>{p.title} <span style={{color:'var(--muted)',fontWeight:400,fontSize:18,letterSpacing:0}}>· {p.path}</span></h1>
          <p>{p.desc||''}{!noData?' · '+Object.keys(local).length+' fields':''} · updated {p.updated||'—'}</p>
        </div>
        <div className="actions">
          {p.file&&<a href={p.file} target="_blank" className="btn btn-ghost"><Icon name="eye" size={14}/> Preview live</a>}
          <button className="btn btn-accent" onClick={save} disabled={saving||noData}><Icon name="save" size={14}/> {saving?'Saving…':'Save & publish'}</button>
        </div>
      </div>

      {noData&&(
        <div className="card" style={{textAlign:'center',padding:'40px 20px',color:'var(--muted)',fontSize:13}}>
          No content loaded — make sure you are signed in and the page JSON file exists in the repo.
        </div>
      )}

      {groupOrder.filter(g=>grouped[g]).map(group=>(
        <div className="card" key={group} style={{marginBottom:16}}>
          <div className="card-head"><h3>{group}</h3></div>
          <div className="field-grid">
            {grouped[group].map(([key,value])=>{
              const type = fieldType(key, value);
              const full = type==='image'||type==='textarea'||String(value||'').length>60;
              return (
                <React.Fragment key={key}>
                {type==='array' && key==='categories' && (
                  <div className="fld full">
                    <label>Category tabs <span className="hint" style={{fontWeight:400}}>— shown as filter tabs on the Recipes page</span></label>
                    {(value||[]).map((cat,ci)=>(
                      <div key={ci} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                        <input value={cat.label||''} onChange={e=>{const a=[...value];a[ci]={...a[ci],label:e.target.value};set(key,a);}} placeholder="Label e.g. Quick Meals" style={{flex:2,background:'var(--input)',border:'1px solid transparent',borderRadius:8,padding:'8px 10px',fontSize:13}}/>
                        <input value={cat.id||''} onChange={e=>{const a=[...value];a[ci]={...a[ci],id:e.target.value};set(key,a);}} placeholder="ID e.g. quick" style={{flex:1,background:'var(--input)',border:'1px solid transparent',borderRadius:8,padding:'8px 10px',fontSize:13,fontFamily:'var(--mono)'}}/>
                        <button onClick={()=>set(key,value.filter((_,x)=>x!==ci))} style={{background:'none',border:0,cursor:'pointer',color:'var(--muted)',fontSize:18,lineHeight:1}}>×</button>
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>set(key,[...(value||[]),{id:'',label:''}])}><Icon name="plus" size={12}/> Add category</button>
                    <span className="hint" style={{display:'block',marginTop:6}}>Label = display name · ID = short key used in recipe files (e.g. "quick", "gut")</span>
                  </div>
                )}
                {type==='array' && key==='featured' && (
                  <div className="fld full">
                    <label>This week's top picks <span className="hint" style={{fontWeight:400}}>— shown in the hero section</span></label>
                    {[0,1,2].map(pi=>{
                      const recipes = ghRecList&&ghRecList.items.length>0?ghRecList.items:[];
                      return (
                        <div key={pi} style={{marginBottom:6}}>
                          <select value={(value||[])[pi]||''} onChange={e=>{const a=[...(value||[])];a[pi]=e.target.value;set(key,a.filter(Boolean));}} style={{width:'100%',background:'var(--input)',border:'1px solid transparent',borderRadius:8,padding:'8px 10px',fontSize:13}}>
                            <option value="">— Pick {pi===0?'1st':pi===1?'2nd':'3rd'} featured recipe —</option>
                            {recipes.filter(r=>r.status!=='draft').map(r=><option key={r.slug||r.id} value={r.slug}>{r.title||r.name}</option>)}
                          </select>
                        </div>
                      );
                    })}
                    <span className="hint" style={{display:'block',marginTop:4}}>Only published (live) recipes appear here</span>
                  </div>
                )}
                {type!=='array' && (
                  <div className={'fld '+(full?'full':'')}>
                    <label>{fmtLabel(key)}</label>
                    {type==='image'
                      ? <ImagePicker value={String(value||'')} onChange={v=>set(key,v)} ghMedia={ghMedia} setGhMedia={setGhMedia} toast={toast}/>
                      : type==='textarea'
                      ? <textarea value={String(value||'')} onChange={e=>set(key,e.target.value)}/>
                      : type==='url'
                      ? <input type="url" value={String(value||'')} onChange={e=>set(key,e.target.value)} placeholder="https://…"/>
                      : <input value={String(value||'')} onChange={e=>set(key,e.target.value)}/>
                    }
                  </div>
                )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      ))}
    </>
  );
}

/* ============ Recipes list + editor ============ */
function RecipesView({data, toast, ghRecList, setGhRecList, ghCats, ghMedia, setGhMedia}){
  const [editing, setEditing]   = useState(null);
  const [statusF, setStatusF]   = useState("all");
  const [catF, setCatF]         = useState("all");
  const [search, setSearch]     = useState("");

  const items = (ghRecList && ghRecList.items.length > 0) ? ghRecList.items : data.recipes;

  const saveRecipeList = async (newItems) => {
    toast('Saving to GitHub…');
    try {
      const result = await ghWrite('content/recipes-list.json', newItems, ghRecList.sha, 'Update recipes list via CMS');
      setGhRecList({sha: result.content.sha, items: newItems});
      toast('Saved ✓ — deploying now');
    } catch(e) { toast('Save failed: ' + e.message); }
  };

  const handleSave = async (recipe, newData) => {
    const isNew = recipe._listIdx === undefined;
    let newItems;
    if (isNew) {
      const nextId = items.length > 0 ? Math.max(...items.map(r=>r.id||0)) + 1 : 1;
      newItems = [...items, {...newData, id: nextId}];
    } else {
      newItems = items.map((r, i) => i === recipe._listIdx ? {...r, ...newData} : r);
    }
    await saveRecipeList(newItems);
    if (isNew) setEditing(null);
  };

  const handleDelete = async (recipe) => {
    if (recipe._listIdx === undefined) return;
    const newItems = items.filter((_, i) => i !== recipe._listIdx);
    await saveRecipeList(newItems);
    setEditing(null);
  };

  if (editing != null) {
    return <RecipeEditor recipe={editing} back={()=>setEditing(null)} toast={toast}
      onSave={handleSave} onDelete={handleDelete} ghMedia={ghMedia} setGhMedia={setGhMedia} ghCats={ghCats}/>;
  }

  const filtered = items.filter(r => {
    if (statusF !== "all" && r.status !== statusF) return false;
    if (catF !== "all" && r.cat !== catF) return false;
    if (search && !((r.title||r.name||"").toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  const catLabel = (id) => { const c = (ghCats||[]).find(x=>x.id===id); return c ? c.label : id; };

  return (
    <>
      <div className="ph-head">
        <div>
          <div className="ek">Recipes &middot; {items.length} total{ghRecList&&ghRecList.items.length>0?' · from GitHub':' · preview data'}</div>
          <h1>Recipes</h1>
          <p>Your recipe library. Drafts don't appear on the live site.</p>
        </div>
        <div className="actions">
          <button className="btn btn-accent" onClick={()=>setEditing({title:'',slug:'',cat:'quick',time:'',servings:'2',difficulty:'Easy',blurb:'',status:'draft',tags:'',ingredients:[],steps:[],heroImage:'',nutrition:{}})}><Icon name="plus" size={14}/> New recipe</button>
        </div>
      </div>
      <div className="fbar">
        <div className="search"><Icon name="search" size={14}/><input placeholder="Search recipes…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="seg">
          {[["all","All"],["live","Live"],["draft","Draft"],["sched","Scheduled"]].map(([k,l])=>(
            <button key={k} className={statusF===k?"on":""} onClick={()=>setStatusF(k)}>{l}</button>
          ))}
        </div>
        <div className="right">
          <select value={catF} onChange={e=>setCatF(e.target.value)} style={{background:"#fff",border:"1px solid var(--line)",borderRadius:10,height:38,padding:"0 12px",fontSize:13}}>
            <option value="all">All categories</option>
            {(ghCats||[]).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </div>
      </div>
      <table className="tbl">
        <thead><tr><th style={{width:"40%"}}>Recipe</th><th>Category</th><th>Time</th><th>Rating</th><th>Status</th><th></th></tr></thead>
        <tbody>
          {filtered.map((r,i) => {
            const idx = items.indexOf(r);
            return (
              <tr key={r.slug||r.id||i} onClick={()=>setEditing({...r, _listIdx:idx})} style={{cursor:"pointer"}}>
                <td><div className="row-thumb">{(r.heroImage||r.image)?<img src={r.heroImage||r.image} style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<div className={"ph "+(r.kind||"")}><span className="lbl">{r.cat}</span></div>}<div><div className="title">{r.title||r.name}</div><div className="sub">{r.slug||'--'}</div></div></div></td>
                <td><span className="chip" style={{background:"var(--surface-2)",color:"#6b6658"}}>{catLabel(r.cat)||r.cat||'--'}</span></td>
                <td className="num">{r.time||'--'}</td>
                <td className="num">{r.stars>0?<span style={{display:"inline-flex",alignItems:"center",gap:4}}><Icon name="star" size={11}/> {r.stars}</span>:'--'}</td>
                <td><span className={"chip "+(r.status||'draft')}>{r.status==="live"?"Live":r.status==="sched"?"Scheduled":"Draft"}</span></td>
                <td className="act"><button className="icon-btn" onClick={e=>{e.stopPropagation();setEditing({...r,_listIdx:idx});}}><Icon name="edit" size={14}/></button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </>
  );
}
function RecipeEditor({recipe, back, toast, onSave, onDelete, ghMedia, setGhMedia, ghCats}){
  const isNew = !recipe._path;
  const [local, setLocal] = useState({
    title:      recipe.title || '',
    slug:       recipe.slug  || (recipe.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-'),
    cat:        recipe.cat  || recipe.category  || 'quick',
    time:       recipe.time      || '',
    servings:   recipe.servings  || '2',
    difficulty: recipe.difficulty|| 'Easy',
    blurb:      recipe.blurb || recipe.description || '',
    status:     recipe.status    || 'draft',
    calories:   recipe.calories  || recipe.nutrition?.calories || '',
    protein:    recipe.protein   || recipe.nutrition?.protein  || '',
    carbs:      recipe.carbs     || recipe.nutrition?.carbs    || '',
    fat:        recipe.fat       || recipe.nutrition?.fat      || '',
  });
  const [heroImage, setHeroImage] = useState(recipe.heroImage || recipe.image || '');
  const [tags, setTags] = useState(
    Array.isArray(recipe.tags) ? recipe.tags.join(', ') : (recipe.tags || '')
  );
  const [newTag, setNewTag] = useState('');
  const [ingredients, setIngredients] = useState(
    Array.isArray(recipe.ingredients) ? recipe.ingredients : ['']
  );
  const [steps, setSteps] = useState(
    Array.isArray(recipe.steps) ? recipe.steps : ['']
  );

  const save = async () => {
    if (!local.title) { toast('Title is required'); return; }
    const slug = local.slug || local.title.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    const tagArr = tags.split(',').map(t=>t.trim()).filter(Boolean);
    const itemRef = isNew
      ? { _path: 'content/recipes/'+slug+'.json', _name: slug+'.json' }
      : recipe;
    const fullData = {
      title: local.title, slug, cat: local.cat, kind: recipe.kind||'',
      time: local.time, servings: local.servings, difficulty: local.difficulty,
      blurb: local.blurb, status: local.status, heroImage,
      tags: tagArr,
      nutrition: { calories: local.calories, protein: local.protein, carbs: local.carbs, fat: local.fat },
      ingredients: ingredients.filter(Boolean),
      steps: steps.filter(Boolean),
    };
    if (onSave) { await onSave(itemRef, fullData); if (isNew) back(); }
    else { toast('Recipe saved'); }
  };

  const handleDelete = async () => {
    if (!recipe._path || !window.confirm('Delete "' + (local.title||'this recipe') + '"?')) return;
    if (onDelete) { await onDelete(recipe); back(); }
  };

  const addTag = () => {
    const t = newTag.trim();
    if (!t) return;
    const cur = tags ? tags.split(',').map(x=>x.trim()).filter(Boolean) : [];
    if (!cur.includes(t)) setTags([...cur, t].join(', '));
    setNewTag('');
  };
  const removeTag = (t) => setTags(tags.split(',').map(x=>x.trim()).filter(x=>x&&x!==t).join(', '));

  const tagArr = tags ? tags.split(',').map(t=>t.trim()).filter(Boolean) : [];

  return (
    <>

function ProductEditor({product, back, toast, onSave, onDelete}){
  const [local, setLocal] = useState({
    title: product.title || '',

    description: product.description || product.blurb || '',
    commission: product.commission || '',
    status: product.status || 'draft',
  });
  const save = async () => {
    if (!local.title) { toast('Title is required'); return; }
    const slug = local.slug || local.title.toLowerCase().replace(/[^a-z0-9]+/g,'-');

    if (!product._path || !window.confirm('Delete "' + (local.title||'this product') + '"?')) return;

function BlogEditor({post, back, toast, onSave, onDelete}){
  const existingFront = post.front || {};
  const [local, setLocal] = useState({
    title: post.title || existingFront.title || '',
    slug: post.slug || existingFront.slug || (post._name||'').replace(/\.md$/,''),
    date: post.date || existingFront.date || new Date().toISOString().slice(0,10),
    category: post.category || existingFront.category || '',
    excerpt: post.excerpt || existingFront.excerpt || '',
    status: post.status || existingFront.status || 'draft',
  });
  const [body, setBody] = useState(post.body || (typeof post._raw === 'string' ? post._raw : '') || '');
  const save = async () => {
    if (!local.title) { toast('Title is required'); return; }
    const slug = local.slug || local.title.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    const mdText = stringifyFrontmatter({ title: local.title, slug, date: local.date, category: local.category, excerpt: local.excerpt, status: local.status }, body);
    const itemRef = post._path ? post : { _path: 'content/posts/' + slug + '.md', _name: slug + '.md' };
    if (onSave) { await onSave(itemRef, mdText); if (!post._path) back(); }
    else { toast('Post saved'); }
  };
  const handleDelete = async () => {
    if (!post._path || !window.confirm('Delete "' + (local.title||'this post') + '"?')) return;
    if (onDelete) { await onDelete(post); back(); }
  };
  return (
    <>
      <div className="ph-head">
        <div>
          <div className="ek" style={{display:"flex",gap:8,alignItems:"center"}}><button onClick={back} className="btn btn-ghost btn-sm" style={{height:22,padding:"0 8px",fontSize:11}}><Icon name="chevR" size={10}/> Blog posts</button> {post._path ? 'Edit post' : 'New post'}</div>
          <h1>{local.title || 'Untitled post'}</h1>
        </div>
        <div className="actions">
          {post._path && <button className="btn btn-danger" onClick={handleDelete}><Icon name="trash" size={14}/> Delete</button>}
          <button className="btn btn-accent" onClick={save}><Icon name="save" size={14}/> {post._path ? 'Save' : 'Publish post'}</button>
        </div>
      </div>
      <div className="editor">
        <div>
          <div className="card">
            <div className="card-head"><h3>Content</h3></div>
            <div className="field-grid">
              <div className="fld full"><label>Title</label><input value={local.title} onChange={e=>setLocal({...local,title:e.target.value,slug:e.target.value.toLowerCase().replace(/[^a-z0-9]+/g,'-')})}/></div>

function TestimonialsView({data, toast, ghItems, onSave, onDelete}){
  const items = (ghItems && ghItems.length > 0) ? ghItems : data.testimonials;
  const blank = {quote:'',name:'',handle:'',status:'live'};
  const [editing, setEditing] = useState(null); // null | 'new' | item object
  const [form, setForm] = useState(blank);

  const openNew = () => { setForm(blank); setEditing('new'); };
  const openEdit = (t) => { setForm({quote:t.quote||'',name:t.name||'',handle:t.handle||'',status:t.status||'live'}); setEditing(t); };

  const save = async () => {
    if (!form.quote || !form.name) { toast('Quote and name are required'); return; }
    const slug = form.name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now().toString(36);
    const isNew = editing === 'new';
    const itemRef = isNew
      ? { _path: 'content/testimonials/' + slug + '.json', _name: slug + '.json' }

/* ============ Media library ============ */
function MediaView({ghMedia, setGhMedia, toast}){
  const [uploading, setUploading] = useState(false);
  const [filter, setFilter] = useState('all');
  const fileRef = React.useRef();

  const handleUpload = async (files) => {
    if (!files || !files.length) return;
    setUploading(true);
    let uploaded = 0;
    for (const file of Array.from(files)) {
      try {
        const arrayBuf = await file.arrayBuffer();
        const bytes = new Uint8Array(arrayBuf);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        const content = btoa(binary);
        const path = 'Website/' + file.name;
        const result = await ghFetch(path, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Upload ' + file.name + ' via CMS', content, branch: GH_BRANCH })
        });
        const kind = /\.(jpe?g|png|webp|gif|avif)$/i.test(file.name) ? 'image' : /\.(mp4|mov|webm)$/i.test(file.name) ? 'video' : 'file';
        const newItem = { name: file.name, path, sha: result.content?.sha, size: file.size, url: result.content?.download_url, kind };
        setGhMedia(prev => [newItem, ...prev.filter(m => m.path !== path)]);
        uploaded++;
      } catch(e) { toast('Failed to upload ' + file.name + ': ' + e.message); }
    }
    setUploading(false);
    if (uploaded) toast(uploaded + ' file' + (uploaded>1?'s':'') + ' uploaded ✓');
  };

  const handleDrop = (e) => { e.preventDefault(); handleUpload(e.dataTransfer.files); };
  const fmtSize = (b) => b > 1048576 ? (b/1048576).toFixed(1)+' MB' : b > 1024 ? (b/1024).toFixed(0)+' KB' : b+' B';
  const displayed = filter==='all' ? ghMedia : ghMedia.filter(m => m.kind===filter);

  return (
    <>
      <div className="ph-head">
        <div><div className="ek">Media · {ghMedia.length} files · Website/ folder</div><h1>Media library</h1><p>Files in your Website/ folder on GitHub. Upload to add new images or videos.</p></div>
        <div className="actions">
          <input ref={fileRef} type="file" multiple accept="image/*,video/*" style={{display:'none'}} onChange={e=>handleUpload(e.target.files)}/>
          <button className="btn btn-accent" onClick={()=>fileRef.current.click()} disabled={uploading}><Icon name="upload" size={14}/> {uploading ? 'Uploading…' : 'Upload files'}</button>
        </div>
      </div>
      <div className="drop" style={{marginBottom:16,cursor:'pointer'}} onDrop={handleDrop} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current.click()}>
        <div className="ic"><Icon name="upload" size={18}/></div>
        <div className="t"><b>Drag &amp; drop or click to upload</b><span>JPG, PNG, WEBP, MP4 · uploaded directly to Website/ in the repo</span></div>
      </div>
      <div className="fbar" style={{marginBottom:16}}>
        <div className="seg">
          {[['all','All'],['image','Images'],['video','Videos'],['file','Other']].map(([k,l])=>(
            <button key={k} className={filter===k?'on':''} onClick={()=>setFilter(k)}>{l}</button>
          ))}
        </div>
      </div>
      {ghMedia.length === 0 && <div style={{padding:'40px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>No files found in Website/ folder. Upload your first file above.</div>}
      <div className="media">
        {displayed.map((m,i) => (
          <div key={m.path||i} className="tile" title={m.name}>
            {m.kind==='image' && m.url
              ? <div className="thumb" style={{backgroundImage:`url(${m.url})`,backgroundSize:'cover',backgroundPosition:'center',borderRadius:8}}/>
              : <div className={"thumb ph " + (m.kind==='video'?'dark':'')}><span className="lbl">{m.kind}</span></div>
            }
            <div className="meta">
              <div className="n" style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
              <div className="s">{fmtSize(m.size||0)}</div>
              {m.url && <button className="btn btn-ghost btn-sm" style={{marginTop:4,width:'100%',fontSize:10}} onClick={()=>{navigator.clipboard.writeText('/'+m.path);toast('Path copied: /'+m.path);}}>Copy path</button>}
              <button className="btn btn-danger btn-sm" style={{marginTop:4,width:'100%',fontSize:10}} onClick={async()=>{if(!window.confirm('Delete '+m.name+'?'))return;try{await ghDelete(m.path,m.sha,'Delete '+m.name+' via CMS');setGhMedia(prev=>prev.filter(x=>x.path!==m.path));toast(m.name+' deleted');}catch(e){toast('Delete failed: '+e.message);}}}>Delete</button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

/* ============ Root ============ */
function App(){
  const [authed, setAuthed]       = useState(false);
  const [ghUser, setGhUser]       = useState(null);
  const [route, setRoute]         = useState("dashboard");
  const [sub, setSub]             = useState(null);
  const [data, setData]           = useState(SEED);
  const [ghPages, setGhPages]     = useState({});
  const [ghRecList, setGhRecList]  = useState({sha:undefined, items:[]});
  const [ghProds, setGhProds]     = useState([]);
  const [ghPosts, setGhPosts]     = useState([]);
  const [ghReels, setGhReels]     = useState([]);
  const [ghTestim, setGhTestim]   = useState([]);
  const [ghMedia, setGhMedia]     = useState([]);
  const [ghCommits, setGhCommits] = useState([]);
  const [loading, setLoading]     = useState(false);
  const [toast, setToast]         = useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 3500); };

  const doLoadGitHub = async () => {
    setLoading(true);
    try {
      const [pages, recListFile, prods, posts, reels, testim, media, commits] = await Promise.all([
        loadPagesFromGitHub(),
        ghRead('content/recipes-list.json').catch(()=>null),
        loadCollectionFromGitHub('content/products'),
        loadCollectionFromGitHub('content/posts'),
        loadCollectionFromGitHub('content/reels'),
        loadCollectionFromGitHub('content/testimonials'),
        loadMediaFromGitHub('Website'),
        loadCommitsFromGitHub(12),
      ]);
      setGhPages(pages);
      setGhRecList(recListFile ? {sha:recListFile.sha, items:Array.isArray(recListFile.data)?recListFile.data:[]} : {sha:undefined,items:[]});
      setGhProds(prods); setGhPosts(posts);
      setGhReels(reels); setGhTestim(testim); setGhMedia(media); setGhCommits(commits);
    } catch(e) { console.error('GitHub load error:', e); showToast('Could not load content from GitHub'); }
    // load GitHub user info
    try {
      const u = await fetch('https://api.github.com/user', { headers: { Authorization: `Bearer ${ghToken()}`, Accept: 'application/vnd.github+json' }});
      if (u.ok) { const d = await u.json(); setGhUser(d); }
    } catch(e) {}
    setLoading(false);
  };

  useEffect(() => {
    try {
      const m = window.location.hash.match(/[#&]gh_token=([^&]+)/);
      if (m) {
        ghSetToken(decodeURIComponent(m[1]));
        localStorage.setItem('myumm.cms.auth','yes');
        history.replaceState(null,'', window.location.pathname);
      }
      if (localStorage.getItem('myumm.cms.auth') === 'yes' && ghToken()) {
        setAuthed(true);
        doLoadGitHub();
      }
    } catch(e) {}
  }, []);

  const handleLogout = () => { setAuthed(false); ghUser && setGhUser(null); ghClearToken(); };

  const savePage = async (pageKey, filename, localData) => {
    const info = ghPages[pageKey];
    if (!info) { showToast('No GitHub data loaded yet — reload and try again'); return; }
    showToast('Saving to GitHub…');
    try {
      const result = await ghWrite('content/pages/' + filename + '.json', localData, info.sha, 'Update ' + pageKey + ' page via CMS');
      setGhPages(prev => ({...prev, [pageKey]: {...prev[pageKey], data: localData, sha: result.content.sha}}));
      showToast(pageKey + ' saved ✓ — deploying now');
    } catch(e) { showToast('Save failed: ' + e.message); }
  };

  const saveEntry = async (item, newData) => {
    if (!item._path) { showToast('Cannot save: missing path'); return; }
    const isNew = !item._sha;
    showToast(isNew ? 'Creating…' : 'Saving to GitHub…');
    try {
      const result = await ghWrite(item._path, newData, item._sha, (isNew ? 'Create ' : 'Update ') + item._name + ' via CMS');
      const newSha = result.content.sha;
      const saved = { ...newData, _sha: newSha, _path: item._path, _name: item._name };
      if      (item._path.startsWith('content/products'))     setGhProds(prev => isNew ? [...prev, saved] : prev.map(p => p._path===item._path ? saved : p));
      else if (item._path.startsWith('content/posts'))        setGhPosts(prev => isNew ? [...prev, saved] : prev.map(p => p._path===item._path ? saved : p));
      else if (item._path.startsWith('content/reels'))        setGhReels(prev => isNew ? [...prev, saved] : prev.map(r => r._path===item._path ? saved : r));
      else if (item._path.startsWith('content/testimonials')) setGhTestim(prev => isNew ? [...prev, saved] : prev.map(t => t._path===item._path ? saved : t));
      showToast((isNew ? 'Created' : 'Saved') + ' ✓ — deploying now');
    } catch(e) { showToast('Save failed: ' + e.message); }
  };

  const deleteEntry = async (item) => {
    if (!item._sha || !item._path) { showToast('Cannot delete: missing file info'); return; }
    showToast('Deleting…');
    try {
      await ghDelete(item._path, item._sha, 'Delete ' + item._name + ' via CMS');
      if      (item._path.startsWith('content/products'))     setGhProds(prev => prev.filter(p => p._path!==item._path));
      else if (item._path.startsWith('content/posts'))        setGhPosts(prev => prev.filter(p => p._path!==item._path));
      else if (item._path.startsWith('content/reels'))        setGhReels(prev => prev.filter(r => r._path!==item._path));
      else if (item._path.startsWith('content/testimonials')) setGhTestim(prev => prev.filter(t => t._path!==item._path));
      showToast('Deleted ✓');
    } catch(e) { showToast('Delete failed: ' + e.message); }
  };

  if (!authed) return <Login />;

  const crumbs = {dashboard:'Dashboard',pages:'Pages',recipes:'Recipes',products:'Products',posts:'Blog posts',reels:'Reels',testimonials:'Testimonials',media:'Media library',settings:'Settings'};
  const crumb = sub ? (crumbs[route] + ' / ' + (sub==='home'?'Home':sub)) : crumbs[route];

  return (
    <div className="app">
      <Sidebar route={route} setRoute={r=>{setRoute(r);setSub(null)}} onLogout={handleLogout} ghUser={ghUser} counts={{recipes:ghRecList.items.length,products:ghProds.length,posts:ghPosts.length,reels:ghReels.length,testimonials:ghTestim.length,media:ghMedia.length}}/>
      <div className="main">
        <Topbar crumb={crumb} loading={loading}/>
        <div className="pageview">
          {route==="dashboard"    && <Dashboard setRoute={setRoute} data={data} ghRec={ghRecList.items} ghProds={ghProds} ghPosts={ghPosts} ghCommits={ghCommits} toast={showToast}/>}
          {route==="pages"  && !sub  && <PagesList data={data} setData={setData} openPage={id=>setSub(id)} toast={showToast}/>}
          {route==="pages"  && sub && (()=>{ const fk={'recipes-index':'recipes','shop-index':'shop','blog-index':'blog'}[sub]||sub; return <PageFieldEditor pageId={sub} data={data} back={()=>setSub(null)} toast={showToast} ghPage={ghPages[fk]} onSave={local=>savePage(fk,fk,local)} ghMedia={ghMedia} setGhMedia={setGhMedia} ghRecList={ghRecList}/>; })()}
          {route==="recipes"      && <RecipesView data={data} toast={showToast} ghRecList={ghRecList} setGhRecList={setGhRecList} ghCats={(ghPages.recipes&&ghPages.recipes.data&&ghPages.recipes.data.categories)||[]} ghMedia={ghMedia} setGhMedia={setGhMedia}/>}
          {route==="products"     && <ProductsView data={data} toast={showToast} ghItems={ghProds} onSave={saveEntry} onDelete={deleteEntry}/>}
          {route==="posts"        && <BlogView toast={showToast} ghItems={ghPosts} onSave={saveEntry} onDelete={deleteEntry}/>}
          {route==="reels"        && <ReelsView data={data} toast={showToast} ghItems={ghReels} onSave={saveEntry} onDelete={deleteEntry}/>}
          {route==="testimonials" && <TestimonialsView data={data} toast={showToast} ghItems={ghTestim} onSave={saveEntry} onDelete={deleteEntry}/>}
          {route==="media"        && <MediaView ghMedia={ghMedia} setGhMedia={setGhMedia} toast={showToast}/>}
          {route==="settings"     && <SettingsView data={data} setData={setData} toast={showToast}/>}
        </div>
      </div>
      {toast && <div className="toast"><span className="d"/>{toast}</div>}
    </div>
  );
}


function Login(){
  const handleGitHub = () => {
    window.location.href = '/api/auth?provider=github';
  };
  return (
    <div className="login">
      <div className="login-side">
        <div className="top">
          <img src="../assets/logo-white.png" className="logo" alt="Myumminess"/>
          <span className="tag">CMS · v2.4</span>
        </div>
        <div className="mid">
          <h1>Run the site the way you <em>run the kitchen</em>.</h1>
          <p>Everything on myumminess.com — recipes, reels, products, pages — edited in one calm, focused place. No code. No FTP.</p>
        </div>
        <div className="bot">Powered by GitHub · secure · private</div>
      </div>
      <div className="login-form" style={{justifyContent:'center'}}>
        <div className="kicker">Sign in</div>
        <h2>Welcome back.</h2>
        <p style={{color:'var(--muted)',fontSize:14,marginBottom:28,lineHeight:1.55}}>Your CMS is connected to GitHub. Sign in with your GitHub account to start editing.</p>
        <button className="btn btn-primary btn-lg" style={{width:'100%',gap:12}} onClick={handleGitHub}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          Continue with GitHub
        </button>
        <div className="hint-box" style={{marginTop:24}}>
          You will be redirected to GitHub to authorise access, then brought back here automatically.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
